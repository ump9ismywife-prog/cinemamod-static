<!doctype html>
<html>
<head>
  <meta charset="utf-8">
  <title>CinemaMod YouTube</title>
  <style>
    html, body, #player {
      margin: 0;
      width: 100%;
      height: 100%;
      background: #000;
      overflow: hidden;
    }

    iframe {
      display: block;
      width: 100%;
      height: 100%;
      border: 0;
    }
  </style>
</head>
<body>
  <div id="player"></div>

  <script>
    let player = null;
    let ready = false;
    let pending = null;
    let lastVolume = 100;

    const tag = document.createElement("script");
    tag.src = "https://www.youtube.com/iframe_api";
    document.head.appendChild(tag);

    function onYouTubeIframeAPIReady() {
      player = new YT.Player("player", {
        width: "100%",
        height: "100%",
        videoId: "",
        playerVars: {
          autoplay: 1,
          controls: 0,
          disablekb: 1,
          fs: 0,
          modestbranding: 1,
          playsinline: 1,
          rel: 0,
          enablejsapi: 1,
          origin: location.origin
        },
        events: {
          onReady: function () {
            ready = true;
            player.mute();

            if (pending) {
              th_video(pending.id, pending.isLivestream);
              pending = null;
            }

            const params = new URLSearchParams(location.search);
            const testId = params.get("v");
            if (testId) {
              th_video(testId, false);
            }
          },

          onStateChange: function (event) {
            if (event.data === YT.PlayerState.PLAYING && lastVolume > 0) {
              setTimeout(function () {
                player.setVolume(lastVolume);
                player.unMute();
              }, 800);
            }
          }
        }
      });
    }

    function normalizeId(id) {
      id = String(id || "");

      const watch = id.match(/[?&]v=([^&]+)/);
      if (watch) return watch[1];

      const short = id.match(/youtu\.be\/([^?&]+)/);
      if (short) return short[1];

      const embed = id.match(/embed\/([^?&]+)/);
      if (embed) return embed[1];

      return id;
    }
