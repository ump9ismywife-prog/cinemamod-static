<!doctype html>
<html>
<head>
  <meta charset="utf-8">
  <title>CinemaMod YouTube</title>
  <style>
    html, body, #player {
      margin: 0;
      width: 100%;
      height: 100%;
      background: #000;
      overflow: hidden;
    }

    iframe {
      display: block;
      width: 100%;
      height: 100%;
      border: 0;
    }
  </style>
</head>
<body>
  <div id="player"></div>

  <script>
    let player = null;
    let ready = false;
    let pending = null;
    let lastVolume = 100;

    const tag = document.createElement("script");
    tag.src = "https://www.youtube.com/iframe_api";
    document.head.appendChild(tag);

    function onYouTubeIframeAPIReady() {
      player = new YT.Player("player", {
        width: "100%",
        height: "100%",
        videoId: "",
        playerVars: {
          autoplay: 1,
          controls: 0,
          disablekb: 1,
          fs: 0,
          modestbranding: 1,
          playsinline: 1,
          rel: 0,
          enablejsapi: 1,
          origin: location.origin
        },
        events: {
          onReady: function () {
            ready = true;
            player.mute();

            if (pending) {
              th_video(pending.id, pending.autoplay);
              pending = null;
            }

            const params = new URLSearchParams(location.search);
            const testId = params.get("v");
            if (testId) {
              th_video(testId, true);
            }
          },
         onStateChange: function (event) {
  if (event.data === YT.PlayerState.PLAYING && lastVolume > 0) {
    setTimeout(function () {
      player.setVolume(lastVolume);
      player.unMute();
    }, 800);
  }
}
      });
    }

    function normalizeId(id) {
      id = String(id || "");

      const watch = id.match(/[?&]v=([^&]+)/);
      if (watch) return watch[1];

      const short = id.match(/youtu\.be\/([^?&]+)/);
      if (short) return short[1];

      const embed = id.match(/embed\/([^?&]+)/);
      if (embed) return embed[1];

      return id;
    }

    function th_video(id, isLivestream) {
  id = normalizeId(id);

  if (!ready || !player || !player.loadVideoById) {
    pending = { id: id, autoplay: true };
    return;
  }

  player.mute();

  player.loadVideoById({
    videoId: id,
    startSeconds: 0
  });

  setTimeout(function () {
    player.playVideo();
  }, 100);
}
    }

    function th_volume(volume) {
      lastVolume = Math.max(0, Math.min(100, Number(volume)));

      if (!player || !player.setVolume) return;

      player.setVolume(lastVolume);

      if (lastVolume <= 0) {
        player.mute();
      } else {
        player.unMute();
      }
    }

    function th_seek(seconds) {
      if (!player || !player.seekTo) return;
      player.seekTo(Number(seconds), true);
    }
  </script>
</body>
</html>
