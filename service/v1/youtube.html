<!doctype html>
<html>
<head>
  <meta charset="utf-8">
  <title>CinemaMod YouTube</title>
  <style>
    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      background: #000;
      overflow: hidden;
    }

    #player, iframe {
      width: 100%;
      height: 100%;
      border: 0;
    }

    #status {
      position: fixed;
      left: 8px;
      top: 8px;
      z-index: 9999;
      color: white;
      background: rgba(0,0,0,.75);
      font: 16px Arial, sans-serif;
      padding: 6px 10px;
    }
  </style>
</head>
<body>
  <div id="player"></div>
  <div id="status">CinemaMod YouTube page loaded</div>

  <script>
    function normalizeId(id) {
      id = String(id || "");

      var watch = id.match(/[?&]v=([^&]+)/);
      if (watch) return watch[1];

      var short = id.match(/youtu\.be\/([^?&]+)/);
      if (short) return short[1];

      var embed = id.match(/embed\/([^?&]+)/);
      if (embed) return embed[1];

      return id;
    }

    function play(id) {
      id = normalizeId(id);

      document.getElementById("status").textContent = "Playing: " + id;

      document.getElementById("player").innerHTML =
        '<iframe ' +
        'src="https://www.youtube.com/embed/' + encodeURIComponent(id) +
        '?autoplay=1&mute=1&controls=0&playsinline=1&rel=0" ' +
        'allow="autoplay; encrypted-media; fullscreen" ' +
        'allowfullscreen></iframe>';
    }

    window.th_video = function (id, isLivestream) {
      play(id);
    };

    window.th_volume = function (volume) {};

    window.th_seek = function (seconds) {};

    var params = new URLSearchParams(location.search);
    var testId = params.get("v");

    if (testId) {
      play(testId);
    }
  </script>
</body>
</html>
