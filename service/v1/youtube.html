<!doctype html>
<html>
<head>
  <meta charset="utf-8">
  <title>CinemaMod YouTube</title>
  <style>
    html, body, #player {
      margin: 0;
      width: 100%;
      height: 100%;
      background: #000;
      overflow: hidden;
    }

    iframe {
      width: 100%;
      height: 100%;
      border: 0;
      display: block;
    }
  </style>
</head>
<body>
  <div id="player"></div>

  <script>
    var player = null;
    var ready = false;
    var pendingVideo = null;
    var lastVolume = 100;

    function normalizeId(id) {
      id = String(id || "");

      var watch = id.match(/[?&]v=([^&]+)/);
      if (watch) return watch[1];

      var short = id.match(/youtu\.be\/([^?&]+)/);
      if (short) return short[1];

      var embed = id.match(/embed\/([^?&]+)/);
      if (embed) return embed[1];

      return id;
    }

    window.onYouTubeIframeAPIReady = function () {
      player = new YT.Player("player", {
        width: "100%",
        height: "100%",
        videoId: "",
        playerVars: {
          autoplay: 1,
          mute: 1,
          controls: 0,
          disablekb: 1,
          fs: 0,
          modestbranding: 1,
          playsinline: 1,
          rel: 0,
          enablejsapi: 1,
          origin: location.origin
        },
        events: {
          onReady: function () {
            ready = true;
            player.mute();

            if (pendingVideo) {
              th_video(pendingVideo.id, pendingVideo.isLivestream);
              pendingVideo = null;
            }

            var testId = new URLSearchParams(location.search).get("v");
            if (testId) {
              th_video(testId, false);
            }
          },

          onStateChange: function (event) {
            if (event.data === YT.PlayerState.PLAYING) {
              player.setVolume(lastVolume);
            }
          }
        }
      });
    };

    window.th_video = function (id, isLivestream) {
      id = normalizeId(id);

      if (!ready || !player || !player.loadVideoById) {
        pendingVideo = { id: id, isLivestream: isLivestream };
        return;
      }

      player.mute();

      player.loadVideoById({
        videoId: id,
        startSeconds: 0
      });

      setTimeout(function () {
        player.playVideo();
      }, 300);
    };

    window.th_volume = function (volume) {
      lastVolume = Math.max(0, Math.min(100, Number(volume)));

      if (!player || !player.setVolume) return;

      player.setVolume(lastVolume);

      if (lastVolume <= 0) {
        player.mute();
      }
    };

    window.th_seek = function (seconds) {
      if (!player || !player.seekTo) return;
      player.seekTo(Number(seconds), true);
    };

    var tag = document.createElement("script");
    tag.src = "https://www.youtube.com/iframe_api";
    document.head.appendChild(tag);
  </script>
</body>
</html>
