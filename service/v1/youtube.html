<!doctype html>
<html>
<head>
  <meta charset="utf-8">
  <title>CinemaMod YouTube Redirect</title>
  <style>
    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      background: #000;
      overflow: hidden;
    }

    #status {
      position: fixed;
      left: 8px;
      top: 8px;
      z-index: 999999;
      color: white;
      background: red;
      font: 18px Arial, sans-serif;
      padding: 8px 12px;
    }
  </style>
</head>
<body>
  <div id="status">page loaded</div>

  <script>
    function normalizeId(id) {
      id = String(id || "");

      var watch = id.match(/[?&]v=([^&]+)/);
      if (watch) return watch[1];

      var short = id.match(/youtu\.be\/([^?&]+)/);
      if (short) return short[1];

      var embed = id.match(/embed\/([^?&]+)/);
      if (embed) return embed[1];

      return id;
    }

    function play(id) {
      id = normalizeId(id);

      document.getElementById("status").textContent = "redirect: " + id;

      var url =
        "https://yewtu.be/embed/" + encodeURIComponent(id) +
        "?autoplay=1" +
        "&mute=1" +
        "&controls=0" +
        "&playsinline=1" +
        "&rel=0" +
        "&fs=0" +
        "&modestbranding=1";

      setTimeout(function () {
        window.location.replace(url);
      }, 300);
    }

    window.th_video = function (id, isLivestream) {
      play(id);
    };

    window.th_volume = function (volume) {};

    window.th_seek = function (seconds) {};

    var params = new URLSearchParams(location.search);
    var testId = params.get("v");

    if (testId) {
      play(testId);
    }
  </script>
</body>
</html>
