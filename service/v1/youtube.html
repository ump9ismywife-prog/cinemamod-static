<!doctype html>
<html>
<head>
  <meta charset="utf-8">
  <title>CinemaMod YouTube</title>
  <style>
    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      background: #000;
      overflow: hidden;
    }

    #player, iframe {
      width: 100%;
      height: 100%;
      border: 0;
      display: block;
    }
  </style>
</head>
<body>
  <div id="player"></div>

  <script>
    function normalizeId(id) {
      id = String(id || "");

      var watch = id.match(/[?&]v=([^&]+)/);
      if (watch) return watch[1];

      var short = id.match(/youtu\.be\/([^?&]+)/);
      if (short) return short[1];

      var embed = id.match(/embed\/([^?&]+)/);
      if (embed) return embed[1];

      return id;
    }

    function play(id) {
      id = normalizeId(id);

      document.getElementById("player").innerHTML =
        '<iframe ' +
        'src="https://www.youtube.com/embed/' + encodeURIComponent(id) +
        '?autoplay=1&mute=1&controls=0&playsinline=1&rel=0" ' +
        'allow="autoplay; encrypted-media; fullscreen" ' +
        'allowfullscreen></iframe>';
    }

    window.th_video = function (id, isLivestream) {
      play(id);
    };

    window.th_volume = function (volume) {
      // iframe fallback mode: volume control is intentionally ignored.
    };

    window.th_seek = function (seconds) {
      // iframe fallback mode: seek is intentionally ignored.
    };

    var params = new URLSearchParams(location.search);
    var testId = params.get("v");

    if (testId) {
      play(testId);
    }
  </script>
</body>
</html>
