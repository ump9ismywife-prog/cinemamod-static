<html>
<body style="margin:0px;background-color:black;overflow:hidden;">
<div id="player" style="width:200%;height:100%;position:absolute;left:-50%;"></div>
<script src="https://www.youtube.com/iframe_api" type="text/javascript"></script>
<script>
function timestamp() {
    return (new Date().getTime()) * 0.001;
}

function target_time() {
    return Math.max(0, (timestamp() - start_time) - 0.5);
}

var player = null;
var player_ready = false;
var to_video = null;
var to_volume = 100;
var start_time = 0;
var seek_to_end = false;

// --- Ad-skip state ---
// The video id we actually want playing. If the player reports a
// different video_id than this, an ad (or unexpected content) is loaded.
var current_id = null;
var ad_showing = false;
var user_volume = 100; // remembers the real volume so we can restore it after muting an ad

function is_ad_playing() {
    try {
        var data = player.getVideoData();
        return !!(data && current_id && data.video_id && data.video_id !== current_id);
    } catch (e) {
        return false;
    }
}

function skip_ad() {
    // Try a plain seek first (works when the ad allows seeking).
    var dur = player.getDuration();
    if (dur > 0) {
        player.seekTo(dur, true);
    }
    if (player.getPlayerState() != 1) {
        player.playVideo();
    }
    // Also force-load the real video directly, which discards whatever is
    // currently playing regardless of whether seeking is locked.
    player.loadVideoById(current_id);
}

function think() {
    if (!player_ready) return;

    if (to_video !== null) {
        player.loadVideoById(to_video);
        to_video = null;
    }
    if (to_volume !== null) {
        user_volume = to_volume;
        if (!ad_showing) {
            player.setVolume(to_volume);
        }
        to_volume = null;
    }

    // --- Ad detection / skip ---
    var ad_now = is_ad_playing();
    if (ad_now && !ad_showing) {
        // Ad just started: mute it.
        ad_showing = true;
        player.setVolume(0);
    } else if (!ad_now && ad_showing) {
        // Ad just ended: restore the real volume.
        ad_showing = false;
        player.setVolume(user_volume);
    }

    if (ad_showing) {
        skip_ad();
        return; // don't run normal sync logic while an ad occupies the player
    }

    if (seek_to_end && player.getDuration() > 0) {
        start_time = timestamp() - player.getDuration();
        seek_to_end = false;
    }

    var target_t = target_time();
    if (target_t < (player.getDuration() - 1.0)) {
        if (Math.abs(player.getCurrentTime() - target_t) > 2.0) {
            player.seekTo(target_t, true);
        }
    }

    if (player.getPlayerState() != 1) {
        player.playVideo();
    }
}
setInterval(think, 100);

function th_video(id, live = false) {
    start_time = timestamp();
    seek_to_end = live;
    current_id = id;
    ad_showing = false;

    if (player !== null) {
        to_video = id;
    } else {
        player = new YT.Player('player', {
            height: '100%',
            width: '100%',
            videoId: id,
            host: 'https://www.youtube-nocookie.com',
            playerVars: {
                autoplay: 1,
                controls: 0,
                showinfo: 0,
                modestbranding: 1,
                rel: 0,
                iv_load_policy: 3
            },
            events: {
                onReady: onReady,
            }
        });
    }
};

function th_volume(volume) {
    to_volume = volume;
};

function th_seek(seconds) {
    start_time = timestamp() - seconds;
};

function onReady(playerId) {
    player_ready = true;
}
</script>
</body>
</html>
