<html>

<body style="margin:0px;background-color:black;overflow:hidden;">
	<div id="player" style="width:200%;height:100%;position:absolute;left:-50%;"></div>
	<script src="https://www.youtube.com/iframe_api" type="text/javascript"></script>
	<script>

		function timestamp() {
			return (new Date().getTime()) * 0.001;
		}

		function target_time() {
			return Math.max(0, (timestamp() - start_time) - 0.5);
		}

		var player = null;
		var player_ready = false;
		var api_ready = false;
		var to_video = null;
		var pending_video = null;
		var pending_live = false;
		var to_volume = 100;
		var start_time = 0;
		var seek_to_end = false;
		var has_started = false;
		var current_video = null;
		var force_autoplay_until = 0;

		function onYouTubeIframeAPIReady() {
			api_ready = true;

			if (pending_video !== null) {
				th_video(pending_video, pending_live);
				pending_video = null;
			}
		}

		function apply_volume() {
			if (!player || !player.setVolume) return;

			var volume = Math.max(0, Math.min(100, Number(to_volume)));
			player.setVolume(volume);

			if (volume <= 0) {
				player.mute();
			} else if (has_started) {
				player.unMute();
			}
		}

		function force_autoplay() {
			if (!player || !player.playVideo || !player.mute) return;

			player.mute();
			player.playVideo();
		}

		function mark_autoplay_window() {
			force_autoplay_until = timestamp() + 10.0;
		}

		function think() {
			if (player_ready) {

				if (to_video !== null) {
					has_started = false;
					current_video = to_video;
					mark_autoplay_window();
					player.mute();
					player.loadVideoById(to_video);
					to_video = null;
				}

				apply_volume();

				if (seek_to_end && player.getDuration() > 0) {
					start_time = timestamp() - player.getDuration();
					seek_to_end = false;
				}

				var target_t = target_time();

				if (target_t < (player.getDuration() - 1.0)) {
					if (Math.abs(player.getCurrentTime() - target_t) > 2.0) {
						player.seekTo(target_t, true);
					}
				}

				if (player.getPlayerState() != 1) {
					player.playVideo();
				}

				if (!has_started && timestamp() < force_autoplay_until) {
					force_autoplay();
				}
			}
		}
		setInterval(think, 100);

		function th_video(id, live = false) {
			start_time = timestamp();
			seek_to_end = live;
			current_video = id;
			has_started = false;
			mark_autoplay_window();

			if (!api_ready || !window.YT || !YT.Player) {
				pending_video = id;
				pending_live = live;
				return;
			}

			if (player !== null) {
				to_video = id;
			} else {
				player = new YT.Player('player', {
					height: '100%',
					width: '100%',
					videoId: id,
					host: 'https://www.youtube-nocookie.com/embed/',
					playerVars: {
						autoplay: 1,
						mute: 1,
						controls: 0,
						showinfo: 0,
						modestbranding: 1,
						rel: 0,
						iv_load_policy: 3,
						playsinline: 1,
						enablejsapi: 1,
						origin: location.origin
					},
					events: {
						onReady: onReady,
						onStateChange: onStateChange
					}
				});
			}
		};

		function th_volume(volume) {
			to_volume = volume;
			apply_volume();
		};

		function th_seek(seconds) {
			start_time = timestamp() - seconds;
		};

		function onReady(playerId) {
			player_ready = true;
			if (player.getIframe) {
				player.getIframe().setAttribute('allow', 'autoplay; encrypted-media; fullscreen');
			}
			player.mute();
			force_autoplay();
			setTimeout(force_autoplay, 250);
			setTimeout(force_autoplay, 750);
		}

		function onStateChange(event) {
			if (event.data === YT.PlayerState.PLAYING) {
				has_started = true;
				force_autoplay_until = 0;
				setTimeout(apply_volume, 500);
				setTimeout(apply_volume, 1200);
			}
		}
	</script>
</body>

</html>
